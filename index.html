<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球情绪温度计 | Global Sentiment Thermometer</title>
<style>
  :root {
    --bg: #0a0e14;
    --surface: #12171f;
    --surface2: #1a1f2b;
    --border: #1e2634;
    --text: #c8cdd6;
    --text-dim: #6b7280;
    --text-bright: #e8ecf2;
    --cold1: #0ea5e9;
    --cold2: #22c55e;
    --neutral: #eab308;
    --hot1: #f97316;
    --hot2: #ef4444;
    --gauge-bg: #1e2634;
    --up: #22c55e;
    --down: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .app { max-width: 1500px; margin: 0 auto; padding: 20px 24px; }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .header-left h1 {
    font-size: 20px; font-weight: 700; color: var(--text-bright);
    letter-spacing: -0.01em;
  }
  .header-left h1 span { color: var(--hot1); }
  .header-left .subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .live-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e; margin-right: 5px; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .last-updated { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .refresh-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 7px 14px; border-radius: 6px;
    cursor: pointer; font-size: 12px; transition: all .2s;
  }
  .refresh-btn:hover { background: #252d3a; border-color: #374151; }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Layout ── */
  .main-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  /* ── Thermometer ── */
  .thermo-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px 20px; display: flex; flex-direction: column; align-items: center;
  }
  .thermo-section .section-label {
    font-size: 12px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: .05em; margin-bottom: 4px;
  }
  .thermo-section .section-title {
    font-size: 14px; font-weight: 600; color: var(--text-bright); margin-bottom: 18px;
  }
  .thermo-container { position: relative; width: 70px; height: 280px; display: flex; flex-direction: column; align-items: center; }
  .thermo-track {
    position: relative; width: 24px; height: 220px; border-radius: 12px;
    background: var(--gauge-bg); overflow: hidden; border: 2px solid var(--border);
  }
  .thermo-fill {
    position: absolute; bottom: 0; left: 0; right: 0; border-radius: 12px;
    transition: height 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    background: linear-gradient(to top, var(--cold1), var(--cold2), var(--neutral), var(--hot1), var(--hot2));
    background-size: 100% 500%;
  }
  .thermo-bulb {
    width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--border);
    margin-top: -3px; position: relative; z-index: 2;
    transition: background 0.8s; box-shadow: 0 0 20px rgba(0,0,0,0.3);
  }
  .thermo-value { font-size: 40px; font-weight: 800; letter-spacing: -.02em; line-height: 1; transition: color .8s; margin: 10px 0 3px; }
  .thermo-status { font-size: 16px; font-weight: 600; transition: color .8s; margin-bottom: 2px; }
  .thermo-desc { font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.4; max-width: 280px; }
  .thermo-range-labels {
    display: flex; justify-content: space-between; width: 100%; margin-top: 6px; font-size: 9px; color: var(--text-dim);
  }

  /* ── Indicators Grid ── */
  .indicators-section { display: flex; flex-direction: column; gap: 16px; }
  .ind-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .indicator-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; display: flex; flex-direction: column; transition: border-color .2s;
    position: relative; overflow: hidden;
  }
  .indicator-card:hover { border-color: #374151; }
  .indicator-card .temp-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    transition: width 0.8s, background 0.8s; border-radius: 0 0 10px 10px;
  }
  .indicator-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .indicator-name { font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .indicator-value { font-size: 16px; font-weight: 700; color: var(--text-bright); letter-spacing: -.01em; }
  .indicator-value .unit { font-size: 11px; font-weight: 400; color: var(--text-dim); margin-left: 2px; }
  .indicator-temp { font-size: 12px; font-weight: 600; }
  .indicator-weight { font-size: 10px; color: var(--text-dim); }

  /* ── Market Data Bar ── */
  .market-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .market-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .market-item .label { font-size: 11px; color: var(--text-dim); }
  .market-item .value { font-size: 16px; font-weight: 700; color: var(--text-bright); }
  .up { color: var(--up); } .down { color: var(--down); }

  /* ── Chart ── */
  .chart-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 20px;
  }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .chart-header h3 { font-size: 14px; font-weight: 600; color: var(--text-bright); }
  .chart-controls { display: flex; gap: 6px; }
  .chart-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all .2s;
  }
  .chart-btn.active { background: var(--surface2); border-color: var(--neutral); color: var(--text-bright); }
  .chart-btn:hover { border-color: #374151; }
  .chart-wrapper { position: relative; width: 100%; height: 200px; }
  .chart-wrapper canvas { width: 100% !important; height: 200px !important; }

  /* ── Sector Heatmap ── */
  .sector-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 20px;
  }
  .sector-section h3 { font-size: 14px; font-weight: 600; color: var(--text-bright); margin-bottom: 14px; }
  .sector-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
  }
  .sector-card {
    border-radius: 8px; padding: 12px; text-align: center;
    transition: transform 0.2s; cursor: default;
  }
  .sector-card:hover { transform: translateY(-1px); }
  .sector-card .sect-name { font-size: 11px; font-weight: 500; margin-bottom: 4px; }
  .sector-card .sect-change { font-size: 14px; font-weight: 700; }
  .sector-card .sect-price { font-size: 10px; opacity: 0.7; margin-top: 2px; }

  /* ── Polymarket ── */
  .poly-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 20px;
  }
  .poly-section h3 { font-size: 14px; font-weight: 600; color: var(--text-bright); margin-bottom: 6px; }
  .poly-sub { font-size: 11px; color: var(--text-dim); margin-bottom: 14px; }
  .poly-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .poly-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px;
  }
  .poly-title { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; min-height: 34px; }
  .poly-main { font-size: 22px; font-weight: 800; color: var(--text-bright); line-height: 1; }
  .poly-meta { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
  .poly-heat { margin-top: 8px; height: 6px; border-radius: 999px; background: var(--gauge-bg); overflow: hidden; }
  .poly-heat-fill { height: 100%; border-radius: 999px; }
  /* ── Loading ── */
  .loading { text-align: center; padding: 40px; color: var(--text-dim); font-size: 13px; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--neutral); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error ── */
  .error-bar {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px; padding: 10px 16px; margin-bottom: 16px;
    font-size: 12px; color: var(--hot2); display: none;
  }

  /* ── Responsive ── */
  @media (max-width: 860px) {
    .main-grid { grid-template-columns: 1fr; }
    .app { padding: 16px; }
    .thermo-section { padding: 20px; }
    .ind-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
  @media (max-width: 480px) {
    .header { flex-direction: column; align-items: flex-start; }
    .market-bar { grid-template-columns: repeat(2, 1fr); }
    .sector-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1><span>全球情绪温度计</span> | US Market Sentiment</h1>
      <div class="subtitle">综合11项宏观 + 情绪指标 · 实时加权计算</div>
    </div>
    <div class="header-right">
      <div class="last-updated">
        <span class="live-dot"></span>
        <span id="updateTime">加载中...</span>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">🔄 刷新数据</button>
    </div>
  </div>

  <!-- Error -->
  <div class="error-bar" id="errorBar"></div>

  <!-- Main Grid -->
  <div class="main-grid">
    <!-- Thermometer -->
    <div class="thermo-section" id="thermoSection">
      <div class="section-label">市场情绪温度</div>
      <div class="section-title">MACRO THERMOMETER</div>
      <div class="thermo-container">
        <div class="thermo-track">
          <div class="thermo-fill" id="thermoFill" style="height: 50%;"></div>
        </div>
        <div class="thermo-bulb" id="thermoBulb"></div>
      </div>
      <div class="thermo-value" id="thermoValue">--</div>
      <div class="thermo-status" id="thermoStatus">加载中</div>
      <div class="thermo-desc" id="thermoDesc">获取实时市场数据...</div>
      <div class="thermo-range-labels">
        <span style="color:var(--cold1)">极度恐慌</span>
        <span style="color:var(--cold2)">偏冷</span>
        <span style="color:var(--neutral)">中性</span>
        <span style="color:var(--hot1)">偏热</span>
        <span style="color:var(--hot2)">极度贪婪</span>
      </div>
    </div>

    <!-- Indicators -->
    <div class="indicators-section">
      <div class="ind-grid" id="indGrid">
        <div class="loading"><div class="spinner"></div>加载指标数据...</div>
      </div>
    </div>
  </div>

  <!-- Market Data Bar -->
  <div class="market-bar" id="marketBar">
    <div class="market-item"><span class="label">S&P 500</span><span class="value" id="sp500Value">--</span></div>
    <div class="market-item"><span class="label">VIX 恐慌</span><span class="value" id="vixValue">--</span></div>
    <div class="market-item"><span class="label">美元指数</span><span class="value" id="dxyValue">--</span></div>
    <div class="market-item"><span class="label">黄金 XAU</span><span class="value" id="goldValue">--</span></div>
    <div class="market-item"><span class="label">10Y 美债</span><span class="value" id="yieldValue">--</span></div>
  </div>

  <!-- History Chart -->
  <div class="chart-section">
    <div class="chart-header">
      <h3>温度趋势</h3>
      <div class="chart-controls">
        <button class="chart-btn active" data-days="30" onclick="switchChartDays(30)">1月</button>
        <button class="chart-btn" data-days="90" onclick="switchChartDays(90)">3月</button>
        <button class="chart-btn" data-days="365" onclick="switchChartDays(365)">1年</button>
      </div>
    </div>
    <div class="chart-wrapper"><canvas id="tempChart"></canvas></div>
  </div>

  <!-- Polymarket -->
  <div class="poly-section">
    <h3>Polymarket 宏观盘 🎯</h3>
    <div class="poly-sub">公开预测市场的利率、地缘与加密风险偏好信号，5分钟刷新</div>
    <div class="poly-grid" id="polyGrid">
      <div class="loading"><div class="spinner"></div>加载 Polymarket 数据...</div>
    </div>
  </div>

  <!-- Sector Heatmap -->
  <div class="sector-section">
    <h3>板块热度 🏭</h3>
    <div class="sector-grid" id="sectorGrid">
      <div class="loading"><div class="spinner"></div>加载板块数据...</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
//  COLOR UTILITIES
// ═══════════════════════════════════
function getTempColor(temp) {
  if (temp <= 20) return { bg: '#0ea5e9', text: '#0ea5e9', stop: 0 };
  if (temp <= 40) return { bg: '#22c55e', text: '#22c55e', stop: 0.25 };
  if (temp <= 60) return { bg: '#eab308', text: '#eab308', stop: 0.5 };
  if (temp <= 80) return { bg: '#f97316', text: '#f97316', stop: 0.75 };
  return { bg: '#ef4444', text: '#ef4444', stop: 1 };
}

function getChangeColor(change) {
  if (change > 0) return '#22c55e';
  if (change < 0) return '#ef4444';
  return '#6b7280';
}

// ═══════════════════════════════════
//  API
// ═══════════════════════════════════
const API_BASE = '';

async function api(path) {
  const res = await fetch(API_BASE + path);
  if (!res.ok) throw new Error(`API ${res.status}: ${res.statusText}`);
  return res.json();
}

// ═══════════════════════════════════
//  RENDER
// ═══════════════════════════════════

function renderThermometer(composite) {
  const fill = document.getElementById('thermoFill');
  const bulb = document.getElementById('thermoBulb');
  const value = document.getElementById('thermoValue');
  const status = document.getElementById('thermoStatus');
  const desc = document.getElementById('thermoDesc');

  const temp = Math.max(0, Math.min(100, composite));
  const color = getTempColor(temp);

  fill.style.height = temp + '%';
  fill.style.backgroundPosition = `0% ${100 - temp}%`;
  bulb.style.background = color.bg;
  bulb.style.boxShadow = `0 0 20px ${color.bg}40`;
  value.textContent = Math.round(temp);
  value.style.color = color.bg;
  status.textContent = '';
  status.style.color = color.bg;

  const labels = [
    { max: 20, s: '极度恐慌', d: '市场极度恐慌 — 往往对应底部区域，逆向投资者可关注买入机会 🔵' },
    { max: 40, s: '偏冷', d: '情绪偏冷 — 估值相对合理，可逐步建仓优质资产 🟢' },
    { max: 60, s: '中性', d: '情绪中性 — 无明显方向性信号，保持现有仓位 🟡' },
    { max: 80, s: '偏热', d: '情绪偏热 — 注意控制仓位，考虑部分止盈 🟠' },
    { max: 100, s: '极度贪婪', d: '极度贪婪 — 往往对应顶部区域，建议减仓防守 🔴' },
  ];
  const match = labels.find(l => temp <= l.max) || labels[labels.length - 1];
  status.textContent = match.s;
  desc.textContent = match.d;
}

function renderIndicators(indicators) {
  const grid = document.getElementById('indGrid');
  grid.innerHTML = '';

  Object.entries(indicators).forEach(([id, ind]) => {
    const color = getTempColor(ind.temperature);
    const valStr = typeof ind.value === 'number' ? ind.value.toFixed(1) : ind.value;
    const card = document.createElement('div');
    card.className = 'indicator-card';
    card.innerHTML = `
      <div class="indicator-header">
        <span class="indicator-name">${ind.name}</span>
        <span class="indicator-weight">w${ind.weight}</span>
      </div>
      <div class="indicator-value">${valStr}</div>
      <div class="indicator-temp" style="color:${color.bg}">${ind.temperature}°</div>
      <div class="temp-bar" style="width:${ind.temperature}%;background:${color.bg}"></div>
    `;
    grid.appendChild(card);
  });
}

function renderMarketData(md) {
  if (!md) return;

  const spVal = document.getElementById('sp500Value');
  const vixVal = document.getElementById('vixValue');
  const dxyVal = document.getElementById('dxyValue');
  const goldVal = document.getElementById('goldValue');
  const yieldVal = document.getElementById('yieldValue');

  if (md.sp500_price) {
    const change = md.sp500_change || 0;
    const cls = change >= 0 ? 'up' : 'down';
    const sign = change > 0 ? '+' : '';
    spVal.innerHTML = `${md.sp500_price.toLocaleString()} <span class="${cls}" style="font-size:12px">${sign}${change}%</span>`;
  }
  if (md.vix) {
    vixVal.textContent = md.vix.toFixed(2);
    vixVal.style.color = md.vix > 25 ? '#ef4444' : md.vix < 15 ? '#22c55e' : '#eab308';
  }
  if (md.dxy) dxyVal.textContent = md.dxy.toFixed(2);
  if (md.gold) goldVal.textContent = md.gold.toLocaleString();
  if (md.us10y) yieldVal.textContent = md.us10y.toFixed(2) + '%';
}

function renderSectors(sectors) {
  const grid = document.getElementById('sectorGrid');
  grid.innerHTML = '';

  Object.entries(sectors).forEach(([name, data]) => {
    const change = data.change || 0;
    const absChange = Math.abs(change);
    const intensity = Math.min(1, absChange / 3);
    const isUp = change >= 0;
    const bgColor = isUp
      ? `rgba(34,197,94,${0.1 + intensity * 0.3})`
      : `rgba(239,68,68,${0.1 + intensity * 0.3})`;
    const borderColor = isUp
      ? `rgba(34,197,94,${0.2 + intensity * 0.4})`
      : `rgba(239,68,68,${0.2 + intensity * 0.4})`;
    const sign = isUp ? '+' : '';

    const card = document.createElement('div');
    card.className = 'sector-card';
    card.style.background = bgColor;
    card.style.border = `1px solid ${borderColor}`;
    card.innerHTML = `
      <div class="sect-name" style="color:${isUp ? '#22c55e' : '#ef4444'}">${name}</div>
      <div class="sect-change">${sign}${change.toFixed(2)}%</div>
      <div class="sect-price">${data.symbol} ${data.price.toFixed(2)}</div>
    `;
    grid.appendChild(card);
  });
}

function renderPolymarket(data) {
  const grid = document.getElementById('polyGrid');
  if (!grid) return;
  const panel = (data && data.panel) || {};
  const cards = [];

  const addCard = (title, main, meta, heat) => {
    const c = getTempColor(heat ?? 50);
    cards.push(`
      <div class="poly-card">
        <div class="poly-title">${title}</div>
        <div class="poly-main">${main}</div>
        <div class="poly-meta">${meta}</div>
        <div class="poly-heat"><div class="poly-heat-fill" style="width:${Math.max(0, Math.min(100, heat ?? 50))}%;background:${c.bg}"></div></div>
      </div>
    `);
  };

  if (panel.fed_decision) {
    addCard(
      'Fed 决议（本月）',
      `${panel.fed_decision.no_change.toFixed(1)}% 不变`,
      `降25bp ${panel.fed_decision.cut25.toFixed(1)}% · 降50bp ${panel.fed_decision.cut50.toFixed(1)}% · 24h $${Math.round(panel.fed_decision.volume24h).toLocaleString()}`,
      100 - panel.fed_decision.no_change
    );
  }
  if (panel.fed_cuts) {
    addCard(
      '2026 降息预期',
      `${panel.fed_cuts.expected_cuts.toFixed(2)} 次`,
      `Polymarket 隐含全年降息次数 · 24h $${Math.round(panel.fed_cuts.volume24h).toLocaleString()}`,
      Math.min(100, panel.fed_cuts.expected_cuts * 25)
    );
  }
  if (panel.iran_peace) {
    addCard(
      '美伊和平概率',
      `${panel.iran_peace.peace_prob.toFixed(1)}%`,
      `越低代表地缘风险越高 · 24h $${Math.round(panel.iran_peace.volume24h).toLocaleString()}`,
      100 - panel.iran_peace.peace_prob
    );
  }
  if (panel.bitcoin) {
    addCard(
      '加密投机热度',
      `${panel.bitcoin.heat.toFixed(1)}°`,
      `${panel.bitcoin.title} · 24h $${Math.round(panel.bitcoin.volume24h).toLocaleString()}`,
      panel.bitcoin.heat
    );
  }

  addCard(
    'Polymarket 宏观热度',
    `${(data.prediction_market_heat || 50).toFixed(1)}°`,
    `利率 + 地缘 + 加密三类信号聚合`,
    data.prediction_market_heat || 50
  );

  grid.innerHTML = cards.join('');
}

// ═══════════════════════════════════
//  CHART
// ═══════════════════════════════════

let historyData = [];
let chartDays = 30;
let chartInstance = null;

function renderChart() {
  const canvas = document.getElementById('tempChart');
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();

  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '200px';
  ctx.scale(dpr, dpr);

  const w = rect.width;
  const h = 200;
  const pad = { top: 12, right: 16, bottom: 28, left: 32 };
  const pw = w - pad.left - pad.right;
  const ph = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);

  // Background bands
  const bands = [
    { y0: 0.8, y1: 1.0, color: 'rgba(14,165,233,0.06)', label: '极度恐慌' },
    { y0: 0.6, y1: 0.8, color: 'rgba(34,197,94,0.05)', label: '偏冷' },
    { y0: 0.4, y1: 0.6, color: 'rgba(234,179,8,0.04)', label: '中性' },
    { y0: 0.2, y1: 0.4, color: 'rgba(249,115,22,0.05)', label: '偏热' },
    { y0: 0, y1: 0.2, color: 'rgba(239,68,68,0.06)', label: '极度贪婪' },
  ];
  bands.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.fillRect(pad.left, pad.top + ph * b.y0, pw, ph * (b.y1 - b.y0));
  });

  // Y-axis labels
  ctx.fillStyle = '#6b7280';
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  [0, 25, 50, 75, 100].forEach(v => {
    const y = pad.top + ph * (1 - v / 100);
    ctx.fillText(v.toString(), pad.left - 6, y + 4);
    ctx.strokeStyle = '#1a1f2b';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();
  });

  if (!historyData || historyData.length < 2) {
    ctx.fillStyle = '#6b7280';
    ctx.textAlign = 'center';
    ctx.font = '13px -apple-system, sans-serif';
    ctx.fillText('暂无历史数据 — 刷新后将开始记录', w/2, h/2);
    return;
  }

  const data = historyData.slice(-chartDays);
  const values = data.map(d => d.composite);
  const min = Math.max(0, Math.min(...values) - 5);
  const max = Math.min(100, Math.max(...values) + 5);
  const range = max - min || 50;

  const getX = i => pad.left + (i / (data.length - 1)) * pw;
  const getY = v => pad.top + ph * (1 - (v - min) / range);

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ph);
  grad.addColorStop(0, 'rgba(249,115,22,0.2)');
  grad.addColorStop(0.5, 'rgba(234,179,8,0.12)');
  grad.addColorStop(1, 'rgba(34,197,94,0.08)');

  ctx.beginPath();
  ctx.moveTo(getX(0), getY(data[0].composite));
  for (let i = 1; i < data.length; i++) ctx.lineTo(getX(i), getY(data[i].composite));
  ctx.lineTo(getX(data.length - 1), pad.top + ph);
  ctx.lineTo(getX(0), pad.top + ph);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  const lineGrad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ph);
  lineGrad.addColorStop(0, '#f97316');
  lineGrad.addColorStop(1, '#22c55e');
  ctx.beginPath();
  ctx.moveTo(getX(0), getY(data[0].composite));
  for (let i = 1; i < data.length; i++) {
    const x0 = getX(i - 1), y0 = getY(data[i - 1].composite);
    const x1 = getX(i), y1 = getY(data[i].composite);
    const cx0 = (x0 + x1) / 2, cy0 = y0;
    const cx1 = (x0 + x1) / 2, cy1 = y1;
    ctx.bezierCurveTo(cx0, cy0, cx1, cy1, x1, y1);
  }
  ctx.strokeStyle = '#f97316';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dots (only for recent ones if many)
  const dotStep = data.length > 30 ? Math.ceil(data.length / 20) : 1;
  data.forEach((d, i) => {
    if (i % dotStep !== 0 && i !== data.length - 1) return;
    ctx.beginPath();
    ctx.arc(getX(i), getY(d.composite), i === data.length - 1 ? 4 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = i === data.length - 1 ? '#f97316' : '#12171f';
    ctx.fill();
    ctx.strokeStyle = getTempColor(d.composite).bg;
    ctx.lineWidth = i === data.length - 1 ? 2 : 1;
    ctx.stroke();
  });

  // X labels
  ctx.fillStyle = '#6b7280';
  ctx.font = '9px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  const labelStep = data.length > 50 ? 14 : data.length > 20 ? 7 : 5;
  data.forEach((d, i) => {
    if (i % labelStep !== 0 && i !== data.length - 1) return;
    const parts = d.date ? d.date.split('-') : [];
    const label = parts.length === 3 ? `${parts[1]}/${parts[2]}` : '';
    ctx.fillText(label, getX(i), h - 8);
  });
}

// ═══════════════════════════════════
//  MAIN REFRESH
// ═══════════════════════════════════

// Detect GitHub Pages: load snapshot.json instead of API
function isGithubPages() {
  return window.location.hostname.includes('github.io') || window.location.hostname.includes('pages.dev');
}

async function tryLoadSnapshot() {
  try {
    const resp = await fetch('./data/snapshot.json?_=' + Date.now());
    if (!resp.ok) return false;
    const data = await resp.json();
    renderThermometer(data.composite);
    renderIndicators(data.indicators);
    renderMarketData(data.market_data);
    renderPolymarket(data.polymarket || {});
    renderSectors(data.sectors || {});
    renderChart();
    document.getElementById('updateTime').textContent = (data.timestamp || '').replace('T', ' ');
    document.getElementById('refreshBtn').textContent = '📡 Pages 快照';
    document.getElementById('refreshBtn').style.cursor = 'default';
    document.getElementById('refreshBtn').onclick = () => { tryLoadSnapshot(); };
    return true;
  } catch { return false; }
}

let isRefreshing = false;

async function refreshAll() {
  if (isRefreshing) return;
  isRefreshing = true;
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⟳ 加载中...';
  const errBar = document.getElementById('errorBar');
  errBar.style.display = 'none';

  try {
    // Fetch temperature and indicators
    const data = await api('/api/temperature');
    renderThermometer(data.composite);
    renderIndicators(data.indicators);
    renderMarketData(data.market_data);
    renderPolymarket(data.polymarket || {});
    renderChart();
    document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');

    // Fetch history
    historyData = await api(`/api/history?days=${Math.max(chartDays, 30)}`);
    renderChart();
  } catch (e) {
    console.error('Refresh error:', e);
    errBar.textContent = `⚠️ 数据获取失败：${e.message}。使用模拟数据展示。`;
    errBar.style.display = 'block';
    // Fallback to simulated data
    useFallbackData();
  }

  // Fetch sectors (independent)
  try {
    const sectors = await api('/api/sectors');
    renderSectors(sectors);
  } catch (e) {
    console.error('Sector fetch error:', e);
  }

  isRefreshing = false;
  btn.disabled = false;
  btn.textContent = '🔄 刷新数据';
}

function switchChartDays(days) {
  chartDays = days;
  document.querySelectorAll('.chart-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.days) === days));
  renderChart();
}

// ═══════════════════════════════════
//  FALLBACK (when API unavailable)
// ═══════════════════════════════════

function useFallbackData() {
  const indicators = {
    vix: { name: 'VIX 恐慌指数', value: 18.5, temperature: 38.5, weight: 15 },
    put_call: { name: 'Put/Call 比率', value: 0.82, temperature: 42.0, weight: 12 },
    aaii_spread: { name: 'AAII 牛熊差', value: 5.2, temperature: 42.1, weight: 12 },
    fear_greed: { name: 'Fear & Greed', value: 52, temperature: 48.0, weight: 10 },
    yield_spread: { name: '10Y-2Y 利差', value: 0.32, temperature: 47.0, weight: 10 },
    hy_oas: { name: '高收益债利差', value: 3.8, temperature: 61.7, weight: 10 },
    dxy: { name: '美元指数 DXY', value: 104.5, temperature: 58.0, weight: 8 },
    gold: { name: '黄金 XAU', value: 2350, temperature: 53.8, weight: 8 },
    sp500_200ma: { name: '标普500 vs 200MA', value: 8.2, temperature: 72.7, weight: 5 },
    ted_spread: { name: 'TED 利差', value: 0.22, temperature: 6.3, weight: 5 },
    bitcoin_fg: { name: '比特币 Fear & Greed', value: 55, temperature: 45.0, weight: 5 },
  };

  const composite = Object.values(indicators).reduce((s, i) => s + i.temperature * i.weight, 0) /
    Object.values(indicators).reduce((s, i) => s + i.weight, 0);

  renderThermometer(composite);
  renderIndicators(indicators);
  renderMarketData({
    sp500_price: 5432, sp500_change: 0.35, vix: 18.5, dxy: 104.5, gold: 2350, us10y: 4.52
  });
  renderPolymarket({ prediction_market_heat: 55, panel: { fed_decision: { no_change: 82, cut25: 14, cut50: 2, volume24h: 850000 }, fed_cuts: { expected_cuts: 1.2, volume24h: 150000 }, iran_peace: { peace_prob: 24, volume24h: 1300000 }, bitcoin: { heat: 68, title: 'Bitcoin above ___ today?', volume24h: 1800000 } } });

  // Generate fallback history
  const now = Date.now();
  historyData = [];
  for (let i = 89; i >= 0; i--) {
    const t = now - i * 86400000;
    const base = 45 + Math.sin(i * 0.12) * 15 + Math.sin(i * 0.05) * 8;
    const noise = (Math.random() - 0.5) * 8;
    historyData.push({
      date: new Date(t).toISOString().split('T')[0],
      composite: Math.round(Math.max(5, Math.min(95, base + noise)))
    });
  }
  renderChart();
  document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
}

// ═══════════════════════════════════

// Resize handler
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderChart, 200);
});

// On GitHub Pages: load snapshot; only use API refresh when backend is available
if (isGithubPages()) {
  tryLoadSnapshot();
} else {
  refreshAll();
  // Auto-refresh every 5 minutes (local backend mode only)
  setInterval(refreshAll, 300000);
}
